<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor de Formatos - Antigravity</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  
  <style>
    body {
      padding: 0;
      margin: 0;
      background: var(--bg-body);
      color: var(--color-text-main);
    }
    
    .admin-container {
      max-width: 98%;
      margin: 0 auto;
      padding: 24px;
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-card);
    }
    
    .admin-title {
      font-size: 1.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--color-primary);
    }
    
    .admin-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      align-items: start;
    }
    
    .sidebar {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--border-radius-lg);
      padding: 16px;
      position: sticky;
      top: 24px;
      max-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
    }
    
    .template-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
      overflow-y: auto;
      flex: 1;
      padding-right: 4px;
    }
    
    .template-list::-webkit-scrollbar {
      width: 6px;
    }
    .template-list::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.1);
      border-radius: 4px;
    }
    
    .template-btn {
      text-align: left;
      padding: 12px 16px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--color-text-main);
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .template-btn:hover {
      background: rgba(0,0,0,0.05);
    }
    
    .template-btn.active {
      background: var(--color-primary-glow);
      color: var(--color-primary);
      border-color: var(--color-primary);
    }
    
    .editor-main {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--border-radius-lg);
      padding: 24px;
      min-height: 500px;
    }
    
    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      background: rgba(37, 99, 235, 0.05);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid rgba(37, 99, 235, 0.1);
    }
    
    .section-group {
      margin-bottom: 32px;
      background: rgba(0,0,0,0.01);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 16px;
    }
    
    .section-title {
      font-size: 1.2rem;
      color: var(--color-primary);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--color-primary-glow);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .sortable-list {
      min-height: 50px;
      padding-bottom: 20px;
    }
    
    /* Acordeón */
    .field-accordion {
      background: var(--bg-body);
      border: 1px solid var(--border-card);
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: all 0.2s ease;
    }
    
    .field-accordion.hidden-field {
      opacity: 0.5;
      border-style: dashed;
    }
    
    .field-header {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      background: var(--bg-card);
    }
    
    .field-header:hover {
      background: rgba(0,0,0,0.02);
    }
    
    .field-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .drag-handle {
      cursor: grab;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
    }
    
    .field-title {
      font-weight: 600;
      color: var(--color-text-main);
    }
    
    .field-id {
      font-family: monospace;
      font-size: 0.8rem;
      background: rgba(0,0,0,0.05);
      padding: 4px 8px;
      border-radius: 4px;
      color: var(--color-text-muted);
    }
    
    .field-body {
      padding: 16px;
      border-top: 1px solid var(--border-card);
      display: none;
      background: var(--bg-body);
    }
    
    .field-accordion.open .field-body {
      display: block;
    }
    
    .field-accordion.open .field-header {
      background: rgba(37, 99, 235, 0.03);
      border-bottom-color: rgba(37, 99, 235, 0.1);
    }
    
    /* Controles */
    .field-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .control-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-text-muted);
    }
    
    .control-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border-card);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--color-text-main);
      font-size: 0.9rem;
    }
    
    .control-input:focus {
      outline: none;
      border-color: var(--color-primary);
    }
    
    .control-input[readonly] {
      background: rgba(0,0,0,0.03);
      color: var(--color-text-muted);
      cursor: not-allowed;
    }
    
    .options-row, .date-options-row {
      grid-column: span 2;
    }
    
    /* Switch */
    .switch-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: var(--color-primary);
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    
    .toast-message {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #10b981;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 500;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 1000;
    }
    .toast-message.show {
      transform: translateY(0);
      opacity: 1;
    }
    
    .loading-spinner {
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="admin-container">
    <header class="admin-header">
      <div class="admin-title">
        <i data-lucide="settings-2"></i>
        Editor Visual de Formatos
      </div>
      <div>
        <button class="btn btn-secondary" onclick="window.close()">
          <i data-lucide="x"></i> Cerrar
        </button>
      </div>
    </header>

    <div class="admin-layout">
      
      <!-- Sidebar de Plantillas -->
      <aside class="sidebar">
        <h3 style="font-size: 1.1rem; margin-bottom: 4px;">Tus Plantillas</h3>
        <p style="font-size: 0.8rem; color: var(--color-text-muted); margin-bottom: 12px;">Selecciona una para configurar</p>
        
        <div class="input-wrapper" style="margin-bottom: 16px;">
          <i data-lucide="search" class="input-icon"></i>
          <input type="text" id="search-templates" class="form-input" placeholder="Buscar cliente..." style="padding-top: 8px; padding-bottom: 8px;">
        </div>
        
        <div class="template-list" id="template-list">
          <div style="padding: 20px; text-align: center; color: var(--color-text-muted);">
            <i data-lucide="loader-2" class="loading-spinner"></i>
            <p>Cargando...</p>
          </div>
        </div>
      </aside>
      
      <!-- Área principal de edición -->
      <main class="editor-main" id="editor-main" style="display: none;">
        <div class="editor-header">
          <div>
            <h2 id="current-template-name" style="margin: 0 0 4px 0; color: var(--color-primary);">Nombre de Plantilla</h2>
            <p id="current-template-count" style="margin: 0; font-size: 0.9rem; color: var(--color-text-muted);">0 campos detectados</p>
          </div>
          
          <div style="display: flex; gap: 12px;">
            <button class="btn btn-secondary" id="btn-add-field" style="display: flex; align-items: center; gap: 8px;">
              <i data-lucide="plus"></i>
              <span>Nuevo Campo</span>
            </button>
            <button class="btn btn-primary" id="btn-save" style="display: flex; align-items: center; gap: 8px;">
              <i data-lucide="save"></i>
              <span>Guardar Cambios</span>
            </button>
          </div>
        </div>
        
        <div class="input-wrapper" style="margin-bottom: 24px;">
          <i data-lucide="search" class="input-icon"></i>
          <input type="text" id="search-fields" class="form-input" placeholder="Buscar pregunta..." autocomplete="off">
        </div>
        
        <div id="fields-container">
          <!-- Secciones y campos generados dinámicamente aquí -->
        </div>
      </main>
      
      <!-- Mensaje cuando no hay selección -->
      <main class="editor-main" id="empty-state" style="display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--color-text-muted);">
        <i data-lucide="file-json" style="width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5;"></i>
        <h3>Selecciona una plantilla del menú izquierdo</h3>
        <p>Aquí podrás personalizar las pestañas, ayudas y opciones de cada campo.</p>
      </main>

    </div>
  </div>

  <div id="toast" class="toast-message">
    <i data-lucide="check-circle"></i> Cambios guardados con éxito en Supabase
  </div>

  <script src="admin.js"></script>
</body>
</html>
